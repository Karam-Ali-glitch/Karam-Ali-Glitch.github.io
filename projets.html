<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Projets</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .navbar {
      background-color: #1a1a2e;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      margin: 0;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #f39c12;
    }

    main {
      min-height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .carte {
      background-color: white;
      border-radius: 12px;
      max-width: 400px;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .avatar {
      width: 60px;
      height: 60px;
      background-color: #0077b6;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .info h3 {
      margin: 0 0 5px 0;
    }

    .info p {
      margin: 0;
      color: #555;
    }

    .bouton-contact {
      background-color: #0077b6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .bouton-contact:hover {
      background-color: #023e8a;
      transform: scale(1.02);
    }
        </style>
</head>
<body>
    <h1>Mes Projets</h1>
    <p>Bientôt, je montrerai ici les sites que j'ai créés pour mes clients.</p>
    <a href="index.html">Retour à l'accueil</a>
</body>
</html>
